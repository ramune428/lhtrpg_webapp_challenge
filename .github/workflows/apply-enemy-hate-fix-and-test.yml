name: Apply enemy hate fix and test

on:
  push:
    branches:
      - test/enemy-formula
    paths:
      - .github/workflows/apply-enemy-hate-fix-and-test.yml

permissions:
  contents: write

jobs:
  apply-fix-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: test/enemy-formula

      - name: Fix enemy hate calculation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/utils/createEnemyPiece.ts')
          source = path.read_text(encoding='utf-8')

          before = '''  const hate =
    rank === "ボス" || rank === "レイド"
      ? Math.floor(cr / 2.4 + 4)
      : race === "ギミック"
        ? 0
        : Math.floor((cr + data.base_hateCr) / 6 + data.base_hate_fix);'''

          after = '''  const hate =
    race === "ギミック"
      ? 0
      : rank === "ボス" || rank === "レイド"
        ? Math.floor(cr / 2.4 + 4)
        : Math.floor((cr * data.base_hateCr) / 6 + data.base_hate_fix);'''

          if before not in source:
              raise SystemExit('Target hate calculation block was not found.')

          path.write_text(source.replace(before, after, 1), encoding='utf-8')
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run enemy formula tests
        working-directory: frontend
        run: npm run test:enemy-formula

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Run build
        working-directory: frontend
        run: npm run build

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-enemy-hate-fix-and-test.yml

      - name: Commit successful fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/utils/createEnemyPiece.ts .github/workflows/apply-enemy-hate-fix-and-test.yml
          git commit -m "Fix enemy hate calculation"
          git push origin HEAD:test/enemy-formula
