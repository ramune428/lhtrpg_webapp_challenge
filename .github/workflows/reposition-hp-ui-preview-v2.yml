name: Reposition HP UI preview v2

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/reposition-hp-ui-preview-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Reposition HP UI preview
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("frontend/app/enemy/page.tsx")
          text = path.read_text(encoding="utf-8")

          preview_pattern = re.compile(
              r'\n\s*<EnemyHitPointRecommendationPreview\n\s*rank=\{form\.rank\}\n\s*hitPoint=\{calculated\.hitPoint\}\n\s*/>\n',
              re.MULTILINE,
          )
          text, removed_preview = preview_pattern.subn("\n", text, count=1)
          if removed_preview != 1:
              raise RuntimeError(f"expected 1 preview block, removed {removed_preview}")

          judgement_marker = '''              <div>
                <h3 className="mb-3 text-sm font-semibold text-neutral-700">
                  判定値
'''
          preview_block = '''              <EnemyHitPointRecommendationPreview
                rank={form.rank}
                hitPoint={calculated.hitPoint}
              />

'''
          if judgement_marker not in text:
              raise RuntimeError("judgement section marker not found")
          text = text.replace(judgement_marker, preview_block + judgement_marker, 1)

          hp_pattern = re.compile(
              r'\n\s{18}<div>\n\s{20}<div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">\n\s{22}<label>最大HP</label>.*?\n\s{18}</div>',
              re.DOTALL,
          )
          text, removed_hp = hp_pattern.subn("", text, count=1)
          if removed_hp != 1:
              raise RuntimeError(f"expected 1 maximum HP field, removed {removed_hp}")

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/reposition-hp-ui-preview.yml").unlink(missing_ok=True)
          Path(".github/workflows/reposition-hp-ui-preview-v2.yml").unlink()

      - name: Validate
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reposition HP UI preview and remove duplicate field"
          git push origin HEAD:fix/enemy-official-formulas
