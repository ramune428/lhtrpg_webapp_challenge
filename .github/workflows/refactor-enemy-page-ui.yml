name: Refactor enemy page UI

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/refactor-enemy-page-ui.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Refactor page markup
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/app/enemy/page.tsx")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str):
              global text
              if old not in text:
                  raise RuntimeError(f"pattern not found:\n{old[:400]}")
              text = text.replace(old, new, 1)

          replace_once(
              'import { EnemyCalculatedValuesPanel, EnemyDropItemSection, EnemyHitPointMultiplierPreview, EnemyHitPointRecommendationPreview, EnemyOutputPanel, EnemyPreviewSection, EnemySkillSection, TabButton } from "@/components/enemy";\n',
              'import {\n  EnemyCalculatedValuesPanel,\n  EnemyDropItemSection,\n  EnemyHitPointMultiplierPreview,\n  EnemyHitPointRecommendationPreview,\n  EnemyOutputPanel,\n  EnemyPreviewSection,\n  EnemySkillSection,\n  TabButton,\n} from "@/components/enemy";\n',
          )

          replace_once(
              'const BODY_LINK_CLASS =\n  "text-sm font-medium text-neutral-700 underline underline-offset-4";\n',
              'const BODY_LINK_CLASS =\n  "text-sm font-medium text-neutral-700 underline underline-offset-4";\nconst FIELD_SIDE_TEXT_CLASS = "whitespace-nowrap text-xs font-medium text-black";\n',
          )

          replace_once(
              '  const recommendedValue = (value: number) =>\n    form.enemyType === "不明" ? "-" : value;\n',
              '  const recommendedValue = (value: number) =>\n    form.enemyType === "不明" ? "-" : value;\n  const recommendedIdentification =\n    form.enemyType === "不明"\n      ? "-"\n      : calculateIdentification(form.popularity, form.cr);\n',
          )

          replace_once(
              '''                <label className="mb-2 block text-sm font-medium">知名度</label>
                <select
''',
              '''                <div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">
                  <label>知名度</label>
                  <span className={FIELD_SIDE_TEXT_CLASS}>
                    識別難易度 {recommendedIdentification}
                  </span>
                </div>
                <select
''',
          )

          replace_once(
              '''
              <div>
                <label className="mb-2 block text-sm font-medium">
                  識別難易度
                </label>
                <input
                  type="text"
                  value={form.identification}
                  onChange={(e) => updateForm("identification", e.target.value)}
                  className="w-full rounded-xl border border-neutral-300 px-4 py-3 outline-none focus:border-neutral-500"
                />
              </div>
''',
              "\n",
          )

          replace_once(
              '''
            <EnemyHitPointRecommendationPreview
              rank={form.rank}
              hitPoint={calculated.hitPoint}
            />

            <div className="mt-8 space-y-6">
''',
              '''
            <div className="mt-8 space-y-6">
''',
          )

          replace_once(
              '''              </div>

              <div>
                <h3 className="mb-3 text-sm font-semibold text-neutral-700">
                  判定値
''',
              '''              </div>

              <EnemyHitPointRecommendationPreview
                rank={form.rank}
                hitPoint={calculated.hitPoint}
              />

              <div>
                <h3 className="mb-3 text-sm font-semibold text-neutral-700">
                  判定値
''',
          )

          replace_once(
              '''                  <div>
                    <div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">
                      <label>最大HP</label>
                      <span>推奨値 {recommendedValue(calculated.hitPoint)}</span>
                    </div>
                    <input
                      type="number"
                      min={0}
                      value={form.hitPoint}
                      onChange={(e) =>
                        updateForm(
                          "hitPoint",
                          toNonNegativeNumber(e.target.value),
                        )
                      }
                      className="w-full rounded-xl border border-neutral-300 px-4 py-3 outline-none focus:border-neutral-500"
                    />
                  </div>
''',
              "",
          )

          hate_block = '''                  <div>
                    <div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">
                      <label>ヘイト倍率</label>
                      <span>推奨値 {recommendedValue(calculated.hate)}</span>
                    </div>
                    <input
                      type="number"
                      min={0}
                      value={form.hate}
                      onChange={(e) =>
                        updateForm("hate", toNonNegativeNumber(e.target.value))
                      }
                      className="w-full rounded-xl border border-neutral-300 px-4 py-3 outline-none focus:border-neutral-500"
                    />
                  </div>
'''
          identification_block = '''                  <div>
                    <div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">
                      <label>識別難易度</label>
                      <span className={FIELD_SIDE_TEXT_CLASS}>
                        推奨値 {recommendedIdentification}
                      </span>
                    </div>
                    <input
                      type="text"
                      value={form.identification}
                      onChange={(e) => updateForm("identification", e.target.value)}
                      className="w-full rounded-xl border border-neutral-300 px-4 py-3 outline-none focus:border-neutral-500"
                    />
                  </div>
'''
          replace_once(hate_block, hate_block + identification_block)

          text = text.replace('<span>推奨値 ', '<span className={FIELD_SIDE_TEXT_CLASS}>推奨値 ')

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/refactor-enemy-page-ui.yml").unlink()

      - name: Validate
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refactor enemy page UI markup"
          git push origin HEAD:fix/enemy-official-formulas
