name: Apply gimmick rank core rule

on:
  push:
    branches:
      - test/enemy-formula
    paths:
      - .github/workflows/apply-gimmick-rank-core.yml

permissions:
  contents: write

jobs:
  apply-rule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test/enemy-formula

      - name: Apply core rule and documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(path_str, before, after, label):
              path = Path(path_str)
              source = path.read_text(encoding='utf-8')
              if before not in source:
                  raise SystemExit(f'Target not found: {label}')
              path.write_text(source.replace(before, after, 1), encoding='utf-8')

          Path('frontend/utils/enemy/calculate.ts').write_text('''import {
  calculateEnemyValues as calculateEnemyValuesBase,
  calculateIdentification,
  getEnemyTypeExplanation,
} from "../createEnemyPiece";
import { normalizeEnemyRankForRace } from "./rank";

export function calculateEnemyValues(
  args: Parameters<typeof calculateEnemyValuesBase>[0],
) {
  return calculateEnemyValuesBase({
    ...args,
    rank: normalizeEnemyRankForRace(args.race, args.rank),
  });
}

export { calculateIdentification, getEnemyTypeExplanation };
''', encoding='utf-8')

          replace_required(
              'frontend/utils/enemy/index.ts',
              'export * from "./piece";\nexport type * from "./types";',
              'export * from "./piece";\nexport * from "./rank";\nexport type * from "./types";',
              'export rank helpers',
          )

          replace_required(
              'frontend/app/enemy/formula/page.tsx',
              '      <p>算出された数値の小数点以下は切り捨て。</p>\n\n      <DetailsBlock title="各能力値（STR / DEX / POW / INT）">',
              '      <p>算出された数値の小数点以下は切り捨て。</p>\n\n      <DetailsBlock title="大種族「ギミック」のエネミーランク">\n        <p>大種族が「ギミック」の場合、エネミーランクは常に「ノーマル」として扱う。</p>\n        <p>計算時に別のランクが指定されている場合も、「ノーマル」に補正して計算する。</p>\n      </DetailsBlock>\n\n      <DetailsBlock title="各能力値（STR / DEX / POW / INT）">',
              'document gimmick rank rule',
          )

          Path('frontend/tests/enemy/gimmick-rank.test.mjs').write_text('''import assert from "node:assert/strict";
import test from "node:test";

import {
  calculateEnemyValues,
  normalizeEnemyRankForRace,
} from "../../utils/enemy/index.ts";

const ranks = ["モブ", "ノーマル", "ボス", "レイド"];

test("大種族ギミックのランクは常にノーマルへ補正される", () => {
  for (const rank of ranks) {
    assert.equal(normalizeEnemyRankForRace("ギミック", rank), "ノーマル");
  }
});

test("大種族ギミックは入力ランクに関係なくノーマル相当の計算結果になる", () => {
  const expected = calculateEnemyValues({
    enemyType: "フェンサー",
    race: "ギミック",
    rank: "ノーマル",
    cr: 10,
  });

  for (const rank of ranks) {
    const actual = calculateEnemyValues({
      enemyType: "フェンサー",
      race: "ギミック",
      rank,
      cr: 10,
    });

    assert.deepEqual(actual, expected, `ギミック / ${rank}`);
  }
});
''', encoding='utf-8')

          replace_required(
              'frontend/package.json',
              '"test:enemy-formula": "node --experimental-strip-types --test tests/enemy/formula.test.mjs"',
              '"test:enemy-formula": "node --experimental-strip-types --test tests/enemy/*.test.mjs"',
              'include gimmick rank test',
          )
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-gimmick-rank-core.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend .github/workflows/apply-gimmick-rank-core.yml
          git commit -m "Enforce normal rank for gimmick calculations"
          git push origin HEAD:test/enemy-formula
