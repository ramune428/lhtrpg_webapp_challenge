name: Reposition HP UI preview

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/reposition-hp-ui-preview.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Reposition HP UI preview
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/app/enemy/page.tsx")
          text = path.read_text(encoding="utf-8")

          old_preview = '''            <EnemyHitPointRecommendationPreview
              rank={form.rank}
              hitPoint={calculated.hitPoint}
            />

'''
          if old_preview not in text:
              raise RuntimeError("existing HP preview block not found")
          text = text.replace(old_preview, "", 1)

          marker = '''              </div>

              <div>
                <h3 className="mb-3 text-sm font-semibold text-neutral-700">
                  判定値
'''
          replacement = '''              </div>

              <EnemyHitPointRecommendationPreview
                rank={form.rank}
                hitPoint={calculated.hitPoint}
              />

              <div>
                <h3 className="mb-3 text-sm font-semibold text-neutral-700">
                  判定値
'''
          if marker not in text:
              raise RuntimeError("judgement section marker not found")
          text = text.replace(marker, replacement, 1)

          hp_block = '''                  <div>
                    <div className="mb-2 flex items-center justify-between gap-3 text-sm font-medium">
                      <label>最大HP</label>
                      <span>推奨値 {recommendedValue(calculated.hitPoint)}</span>
                    </div>
                    <input
                      type="number"
                      min={0}
                      value={form.hitPoint}
                      onChange={(e) =>
                        updateForm(
                          "hitPoint",
                          toNonNegativeNumber(e.target.value),
                        )
                      }
                      className="w-full rounded-xl border border-neutral-300 px-4 py-3 outline-none focus:border-neutral-500"
                    />
                  </div>
'''
          if hp_block not in text:
              raise RuntimeError("existing maximum HP field not found")
          text = text.replace(hp_block, "", 1)

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/reposition-hp-ui-preview.yml").unlink()

      - name: Validate
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reposition HP UI preview and remove duplicate field"
          git push origin HEAD:fix/enemy-official-formulas
