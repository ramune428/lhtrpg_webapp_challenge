name: Apply enemy formula documentation fix

on:
  push:
    branches:
      - test/enemy-formula
    paths:
      - .github/workflows/apply-enemy-formula-doc-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: test/enemy-formula

      - name: Update hate formula notation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/app/enemy/formula/page.tsx')
          source = path.read_text(encoding='utf-8')
          before = '{"(<CR> * <base_hateCr>) // 6 + <base_hate_fix>"}'
          after = '{"(<CR> * <base_hateCr>) / 6 + <base_hate_fix>"}'

          if before not in source:
              raise SystemExit('Target hate formula notation was not found.')

          path.write_text(source.replace(before, after, 1), encoding='utf-8')
          PY

      - name: Commit documentation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/app/enemy/formula/page.tsx
          git commit -m "Fix hate formula notation"
          git push origin HEAD:test/enemy-formula
