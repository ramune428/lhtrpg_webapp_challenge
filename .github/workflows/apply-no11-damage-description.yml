name: Apply No.11 damage description

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/apply-no11-damage-description.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Update damage description
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/app/enemy/formula/page.tsx")
          text = path.read_text(encoding="utf-8")

          old = '''      <DetailsBlock title="ダメージ固定値">
        <DetailsBlock title="アーマラー、フェンサー、グラップラー、ヒーラー">
          <FormulaText>{"<CR> * 3.5 + 8 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="サポーター">
          <FormulaText>{"<CR> * 3.5 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="スピア、アーチャー">
          <FormulaText>{"<CR> * 6 + 18 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="シューター、ボマー">
          <FormulaText>{"<CR> * 6 + 18"}</FormulaText>
        </DetailsBlock>
      </DetailsBlock>
'''

          new = '''      <DetailsBlock title="基本攻撃ダメージ">
        <p>
          以下の式は、基本攻撃の推奨ダメージ合計です。
          実際の出力では、推奨ダメージ合計から2Dの期待値7を差し引いた値を固定値とし、「固定値 + 2D」の形式で出力します。
        </p>

        <DetailsBlock title="アーマラー、フェンサー、グラップラー、ヒーラー">
          <FormulaText>{"推奨ダメージ合計 = <CR> * 3.5 + 8 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="サポーター">
          <FormulaText>{"推奨ダメージ合計 = <CR> * 3.5 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="スピア">
          <FormulaText>{"推奨ダメージ合計 = <CR> * 6 + 18 + 8"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="アーチャー">
          <FormulaText>{"推奨ダメージ合計 = (<CR> * 6 + 18 + 8) * 0.9"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="シューター">
          <FormulaText>{"推奨ダメージ合計 = <CR> * 6 + 18"}</FormulaText>
        </DetailsBlock>

        <DetailsBlock title="ボマー">
          <FormulaText>{"推奨ダメージ合計 = (<CR> * 6 + 18) * 0.85"}</FormulaText>
        </DetailsBlock>
      </DetailsBlock>
'''

          if old not in text:
            raise RuntimeError("No.11 damage block was not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/apply-no11-damage-description.yml").unlink()

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clarify basic attack damage formulas"
          git push origin HEAD:fix/enemy-official-formulas
