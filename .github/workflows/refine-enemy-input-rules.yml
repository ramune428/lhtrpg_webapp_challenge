name: Refine enemy input rules

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/refine-enemy-input-rules.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Refine implementation
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise RuntimeError(f"pattern not found: {path}\n{old[:160]}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          path = "frontend/utils/enemy/constants.ts"
          replace_once(
              path,
              'export {\n  enemyRaces,\n  enemyRanks,\n  enemyTypes,\n  popularityList,\n  skillTimings,\n} from "../createEnemyPiece";\n\nimport { enemyTypes } from "../createEnemyPiece";\n',
              'import { enemyTypes } from "../createEnemyPiece";\n\nexport {\n  enemyRaces,\n  enemyRanks,\n  enemyTypes,\n  popularityList,\n  skillTimings,\n} from "../createEnemyPiece";\n',
          )

          path = "frontend/hooks/useEnemyForm.ts"
          replace_once(
              path,
              '      return next.length > 0\n        ? next\n        : [withDropRowId(createEmptyDropItemInput())];\n',
              '      return next.length > 0\n        ? next\n        : [\n            withDropRowId({\n              ...createEmptyDropItemInput(),\n              dice: form.rank === "モブ" ? "固定" : "",\n            }),\n          ];\n',
          )
          replace_once(
              path,
              '        const additional = Array.from({ length: nextCount - prev.length }, () =>\n          withDropRowId(createEmptyDropItemInput()),\n        );\n',
              '        const additional = Array.from({ length: nextCount - prev.length }, () =>\n          withDropRowId({\n            ...createEmptyDropItemInput(),\n            dice: form.rank === "モブ" ? "固定" : "",\n          }),\n        );\n',
          )

          Path(".github/workflows/refine-enemy-input-rules.yml").unlink()

      - name: Validate
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refine mob drop item defaults"
          git push origin HEAD:fix/enemy-official-formulas
