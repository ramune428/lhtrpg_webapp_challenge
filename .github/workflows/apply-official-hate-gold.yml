name: Apply official hate and gold fixes

on:
  push:
    branches:
      - fix/enemy-official-formulas
    paths:
      - .github/workflows/apply-official-hate-gold.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/enemy-official-formulas

      - name: Patch official hate and gold formulas
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              Path("frontend/app/enemy/formula/page.tsx"): [
                  ('ヘイト倍率（CR係数）', 'ヘイト倍率（CR補正値）'),
                  ('(<CR> * <base_hateCr>) / 6 + <base_hate_fix>', '(<CR> + <base_hateCr>) / 6 + <base_hate_fix>'),
                  ('※ 最終値は 5 の倍数になるように切り捨てる', '※ 公式のドロップ期待値に合わせ、最終値は小数点以下を切り捨てる'),
              ],
              Path("frontend/utils/createEnemyPiece.ts"): [
                  ('''  let gold = (cr + 2) * (cr + 2) * 0.72 + 17;
  if (race === "ギミック" || rank === "モブ") {
    gold /= 2;
  } else if (rank === "ボス" || rank === "レイド") {
    gold *= 4;
  }
  const goldRounded = Math.floor(gold) - (Math.floor(gold) % 5);
''', '''  let gold = Math.floor((cr + 2) * (cr + 2) * 0.72 + 17);
  if (race === "ギミック" || rank === "モブ") {
    gold = Math.floor(gold / 2);
  } else if (rank === "ボス" || rank === "レイド") {
    gold *= 4;
  }
  const goldRounded = gold;
'''),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old not in text:
                      raise RuntimeError(f"target text not found in {path}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/apply-official-hate-gold.yml").unlink()

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align formula docs with official hate and gold values"
          git push origin HEAD:fix/enemy-official-formulas

